apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-backend
  labels:
    {{- include "fifa-wc-2026-card-trading.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "fifa-wc-2026-card-trading.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "fifa-wc-2026-card-trading.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        {{- toYaml .Values.backend.podLabels | nindent 8 }}
      annotations:
        {{- toYaml .Values.backend.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "fifa-wc-2026-card-trading.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.containerPort }}
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-config
                  key: PORT
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-config
                  key: CORS_ORIGINS
            - name: API_RATE_LIMIT_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-config
                  key: API_RATE_LIMIT_PER_MINUTE
            - name: LOGIN_RATE_LIMIT_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-config
                  key: LOGIN_RATE_LIMIT_PER_MINUTE
            - name: REGISTER_RATE_LIMIT_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-config
                  key: REGISTER_RATE_LIMIT_PER_MINUTE
            - name: WS_MAX_CONNECTIONS_PER_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-config
                  key: WS_MAX_CONNECTIONS_PER_USER
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-config
                  key: LOG_LEVEL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fifa-wc-2026-card-trading.secretName" . }}
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fifa-wc-2026-card-trading.secretName" . }}
                  key: JWT_SECRET
            {{- range .Values.backend.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
