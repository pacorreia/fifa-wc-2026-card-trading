apiVersion: v1
kind: Service
metadata:
  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-frontend
  labels:
    {{- include "fifa-wc-2026-card-trading.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "fifa-wc-2026-card-trading.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
