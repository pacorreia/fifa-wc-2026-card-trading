apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fifa-wc-2026-card-trading.fullname" . }}-config
  labels:
    {{- include "fifa-wc-2026-card-trading.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.backend.env.PORT | quote }}
  CORS_ORIGINS: {{ .Values.backend.env.CORS_ORIGINS | quote }}
  API_RATE_LIMIT_PER_MINUTE: {{ .Values.backend.env.API_RATE_LIMIT_PER_MINUTE | quote }}
  LOGIN_RATE_LIMIT_PER_MINUTE: {{ .Values.backend.env.LOGIN_RATE_LIMIT_PER_MINUTE | quote }}
  REGISTER_RATE_LIMIT_PER_MINUTE: {{ .Values.backend.env.REGISTER_RATE_LIMIT_PER_MINUTE | quote }}
  WS_MAX_CONNECTIONS_PER_USER: {{ .Values.backend.env.WS_MAX_CONNECTIONS_PER_USER | quote }}
  LOG_LEVEL: {{ .Values.backend.env.LOG_LEVEL | quote }}
  config.js: |
    window.APP_CONFIG = {
      API_BASE_URL: {{ .Values.frontend.config.apiBaseUrl | quote }},
      WS_BASE_URL: {{ .Values.frontend.config.wsBaseUrl | quote }}
    };
