services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fifa_wc_2026
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fifa_wc_2026"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fifa_wc_2026?sslmode=disable
      JWT_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:8081
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  postgres-data:
