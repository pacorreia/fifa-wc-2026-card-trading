name: CI

on:
  pull_request:
    branches: [main]

env:
  IS_SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  docker-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha,scope=backend
          cache-to: ${{ env.IS_SAME_REPO == 'true' && 'type=gha,mode=max,scope=backend' || '' }}

  docker-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: ${{ env.IS_SAME_REPO == 'true' && 'type=gha,mode=max,scope=frontend' || '' }}
